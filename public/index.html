<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Console</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #09090d;
            color: #e9e9f2;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            text-align: center;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #8b7cf6, #5b4bd6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #a7a7b2;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .download-btn {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(135deg, #8b7cf6, #5b4bd6);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 20px rgba(139,124,246,0.3);
        }
        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(139,124,246,0.5);
        }
        .status {
            margin-top: 20px;
            color: #7b7d8b;
            font-size: 14px;
        }
        .status .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .dot.green { background: #3dd68c; }
        .dot.red { background: #ff7278; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Console</h1>
        <p>Multi-Provider AI Chat Application</p>
        
        <!-- DOWNLOAD BUTTON - KINI ANG IMPORTANTE -->
        <a href="/multi.apk" download="multi.apk" class="download-btn">
            📱 Download for Android (APK)
        </a>
        
        <div class="status" id="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Checking status...</span>
        </div>
    </div>

    <script>
        async function checkAPK() {
            try {
                const res = await fetch('/api/apk-info');
                const data = await res.json();
                
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                
                if (data.exists) {
                    dot.className = 'dot green';
                    text.textContent = `✅ APK Available (${data.sizeMB} MB)`;
                } else {
                    dot.className = 'dot red';
                    text.textContent = '❌ APK Not Found';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        checkAPK();
    </script>
</body>
</html>
<script>
const MODELS = {
  gemini: [
    { id: "gemini-2.5-flash", label: "Gemini 2.5 Flash" },
    { id: "gemini-2.5-flash-lite", label: "Gemini 2.5 Flash-Lite" },
    { id: "gemini-2.5-pro", label: "Gemini 2.5 Pro (paid)" }
  ],
  groq: [
    { id: "llama-3.3-70b-versatile", label: "Llama 3.3 70B Versatile" },
    { id: "llama-3.1-8b-instant", label: "Llama 3.1 8B Instant" },
    { id: "meta-llama/llama-4-scout-17b-16e-instruct", label: "Llama 4 Scout (vision)" },
    { id: "mixtral-8x7b-32768", label: "Mixtral 8x7B" }
  ],
  openrouter: [
    { id: "openrouter/free", label: "Auto Free Router (Best)" },
    { id: "openai/gpt-oss-120b:free", label: "GPT-OSS 120B (FREE!)" },
    { id: "openai/gpt-oss-20b:free", label: "GPT-OSS 20B" },
    { id: "nvidia/nemotron-3-super-120b-a12b:free", label: "Nemotron 3 Super 120B" },
    { id: "nvidia/nemotron-3-nano-30b-a3b:free", label: "Nemotron 3 Nano 30B" },
    { id: "z-ai/glm-4.5-air:free", label: "GLM 4.5 Air" },
    { id: "google/gemma-4-31b-it:free", label: "Gemma 4 31B" },
    { id: "moonshotai/kimi-k2.6:free", label: "Kimi K2.6" }
  ],
  grok: [
    { id: "grok-4.3", label: "📷 Grok 4.3" }
  ]
};

const VISION_MODELS = new Set([
  "gemini-2.5-flash", "gemini-2.5-flash-lite", "gemini-2.5-pro",
  "meta-llama/llama-4-scout-17b-16e-instruct",
  "grok-4.3"
]);

const state = {
  provider: "gemini",
  histories: { gemini: [], groq: [], openrouter: [], grok: [] },
};

const els = {
  providerBtns: document.querySelectorAll(".provider-item"),
  modelSelect: document.getElementById("modelSelect"),
  chatCol: document.getElementById("chatCol"),
  emptyState: document.getElementById("emptyState"),
  userInput: document.getElementById("userInput"),
  sendBtn: document.getElementById("sendBtn"),
  clearBtn: document.getElementById("clearBtn"),
  fileInput: document.getElementById("fileInput"),
  attachBtn: document.getElementById("attachBtn"),
  attachmentsBar: document.getElementById("attachmentsBar"),
  sidebar: document.getElementById("sidebar"),
  overlay: document.getElementById("overlay"),
  collapseBtn: document.getElementById("collapseBtn"),
  hamburgerBtn: document.getElementById("hamburgerBtn"),
  newChatBtn: document.getElementById("newChatBtn"),
  searchBtn: document.getElementById("searchBtn"),
  searchPanel: document.getElementById("searchPanel"),
  closeSearchBtn: document.getElementById("closeSearchBtn"),
  searchInput: document.getElementById("searchInput"),
  searchResults: document.getElementById("searchResults"),
  fastPill: document.getElementById("fastPill"),
};

let pendingMedia = [];

/* ==================== SIDEBAR RESPONSIVE BEHAVIOR ==================== */
function isMobile(){ return window.innerWidth <= 900; }

function openSidebar(){
  els.sidebar.classList.remove("collapsed");
  if(isMobile()) els.overlay.classList.add("show");
}
function closeSidebar(){
  els.sidebar.classList.add("collapsed");
  els.overlay.classList.remove("show");
}
function toggleSidebar(){
  if(els.sidebar.classList.contains("collapsed")) openSidebar(); else closeSidebar();
}
els.collapseBtn.addEventListener("click", toggleSidebar);
els.hamburgerBtn.addEventListener("click", toggleSidebar);
els.overlay.addEventListener("click", closeSidebar);

function applyResponsiveDefault(){
  if(isMobile()) closeSidebar(); else openSidebar();
}
window.addEventListener("resize", applyResponsiveDefault);
applyResponsiveDefault();

els.searchBtn.addEventListener("click", ()=>{
  openSearchPanel();
});

els.closeSearchBtn.addEventListener("click", ()=>{
  closeSearchPanel();
});

els.searchInput.addEventListener("input", ()=>{
  performSearch(els.searchInput.value);
});

els.newChatBtn.addEventListener("click", ()=>{
  state.histories[state.provider] = [];
  renderHistory();
  closeSearchPanel();
  if(isMobile()) closeSidebar();
});

/* ==================== HELPERS ==================== */
function getFileType(mimeType) {
  if (mimeType.startsWith("image/")) return "image";
  if (mimeType.startsWith("video/")) return "video";
  return "unknown";
}
function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

/* ==================== PASTE SUPPORT (Images & Videos) ==================== */
document.addEventListener("paste", async (e) => {
  const items = e.clipboardData?.items || [];

  for (const item of items) {
    if (item.type.startsWith("image/") || item.type.startsWith("video/")) {
      const file = item.getAsFile();

      const model = els.modelSelect.value;
      if (!VISION_MODELS.has(model)) {
        appendMessage("error", "❌ This model doesn't support media. Please select a vision-capable model like Gemini 2.5 Flash or Llama 4 Scout.");
        return;
      }

      if (file.size > 20 * 1024 * 1024) {
        appendMessage("error", "❌ File too large! Maximum size is 20MB.");
        return;
      }

      try {
        const base64 = await fileToBase64(file);
        const fileType = getFileType(file.type);

        pendingMedia.push({
          base64,
          mimeType: file.type,
          previewUrl: URL.createObjectURL(file),
          type: fileType,
          size: file.size,
          name: file.name || (fileType === "video" ? "video.mp4" : "image.png")
        });
        renderAttachmentsBar();

        const typeLabel = fileType === "video" ? "🎥 Video" : "📸 Image";
        appendMessage("assistant", `✅ ${typeLabel} pasted successfully! (${formatFileSize(file.size)})`);
      } catch (err) {
        console.error("Failed to paste media:", err);
        appendMessage("error", "❌ Failed to paste media. Please try again.");
      }

      break;
    }
  }
});

/* ==================== FILE INPUT (Upload) ==================== */
els.attachBtn.addEventListener("click", ()=>{
  if(els.attachBtn.classList.contains("disabled")){
    appendMessage("error", "❌ Pili ug vision-capable nga model una para makapadala ug media.");
    return;
  }
  els.fileInput.click();
});

els.fileInput.addEventListener("change", async (e)=>{
  const files = Array.from(e.target.files || []);

  for(const file of files){
    const fileType = getFileType(file.type);

    if (fileType === "unknown") {
      appendMessage("error", `❌ Unsupported file type: ${file.type}`);
      continue;
    }

    if (file.size > 20 * 1024 * 1024) {
      appendMessage("error", `❌ File too large! ${file.name} (${formatFileSize(file.size)}) exceeds 20MB limit.`);
      continue;
    }

    try {
      const base64 = await fileToBase64(file);
      pendingMedia.push({
        base64,
        mimeType: file.type,
        previewUrl: URL.createObjectURL(file),
        type: fileType,
        size: file.size,
        name: file.name
      });
    } catch (err) {
      console.error("Failed to read file:", err);
      appendMessage("error", `❌ Failed to read ${file.name}`);
    }
  }

  els.fileInput.value = "";
  renderAttachmentsBar();
});

/* ==================== ATTACHMENTS BAR ==================== */
function renderAttachmentsBar(){
  els.attachmentsBar.innerHTML = "";

  pendingMedia.forEach((media, idx)=>{
    const div = document.createElement("div");
    div.className = "thumb";

    let previewHtml = '';
    if (media.type === "video") {
      previewHtml = `<video src="${media.previewUrl}" muted playsinline></video>`;
    } else {
      previewHtml = `<img src="${media.previewUrl}" alt="Media ${idx+1}">`;
    }

    div.innerHTML = `
      ${previewHtml}
      <button class="remove" data-idx="${idx}">✕</button>
      <span class="file-type-badge">${media.type === "video" ? "🎥" : "📸"}</span>
      <span class="file-size">${formatFileSize(media.size)}</span>
    `;
    els.attachmentsBar.appendChild(div);
  });

  els.attachmentsBar.querySelectorAll(".remove").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      pendingMedia.splice(parseInt(btn.dataset.idx), 1);
      renderAttachmentsBar();
    });
  });
}

/* ==================== STATUS / MODELS ==================== */
async function loadStatus(){
  try{
    const res = await fetch("/api/status");
    const status = await res.json();
    setDot("gemini", status.geminiConfigured);
    setDot("groq", status.groqConfigured);
    setDot("openrouter", status.openrouterConfigured);
    setDot("grok", status.grokConfigured);
  } catch(e){ console.error("Could not reach backend /api/status", e); }
}
function setDot(provider, ok){
  const dot = document.getElementById(`dot-${provider}`);
  if(dot) dot.className = "status " + (ok ? "ok" : "missing");
}

function populateModels(){
  els.modelSelect.innerHTML = "";
  MODELS[state.provider].forEach(m=>{
    const opt = document.createElement("option");
    opt.value = m.id;
    opt.textContent = m.label;
    els.modelSelect.appendChild(opt);
  });
  refreshVisionUI();
}
els.modelSelect.addEventListener("change", refreshVisionUI);

function refreshVisionUI(){
  const model = els.modelSelect.value;
  const supportsVision = VISION_MODELS.has(model);
  els.attachBtn.classList.toggle("disabled", !supportsVision);
  els.attachBtn.title = supportsVision ? "Attach image or video" : "Kini nga model dili suporta og media";
  if(!supportsVision){ pendingMedia = []; renderAttachmentsBar(); }
}

function setProvider(p){
  state.provider = p;
  els.providerBtns.forEach(b=> b.classList.toggle("active", b.dataset.provider === p));
  populateModels();
  renderHistory();
  closeSearchPanel();
  if(isMobile()) closeSidebar();
}
els.providerBtns.forEach(btn=> btn.addEventListener("click", ()=> setProvider(btn.dataset.provider)));

function openSearchPanel(){
  els.searchPanel.classList.add("active");
  els.searchInput.focus();
  if(isMobile()) closeSidebar();
  performSearch(els.searchInput.value);
}
function closeSearchPanel(){
  els.searchPanel.classList.remove("active");
  els.searchInput.value = "";
  renderSearchResults([]);
}

function performSearch(query){
  const normalized = String(query).trim().toLowerCase();
  if(!normalized){
    renderSearchResults([]);
    return;
  }

  const hist = state.histories[state.provider] || [];
  const results = hist
    .map((item, idx)=>(
      { role: item.role, content: item.content || "", index: idx }
    ))
    .filter(item => item.content.toLowerCase().includes(normalized));

  renderSearchResults(results, normalized);
}

function renderSearchResults(results){
  els.searchResults.innerHTML = "";
  if(!results || results.length === 0){
    els.searchResults.innerHTML = `<div class="no-results">No matching messages found. Try a different keyword.</div>`;
    return;
  }

  results.forEach(item => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "search-result";
    card.dataset.index = item.index;
    card.innerHTML = `
      <div class="result-role">${item.role === "user" ? "You" : "Assistant"}</div>
      <div class="result-text">${escapeHtml(item.content).slice(0, 280)}</div>
    `;
    card.addEventListener("click", ()=>{
      const target = els.chatCol.children[item.index];
      if(target){
        target.classList.add("highlight");
        target.scrollIntoView({ behavior: "smooth", block: "center" });
        setTimeout(()=> target.classList.remove("highlight"), 2200);
      }
    });
    els.searchResults.appendChild(card);
  });
}

function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ==================== CODE BLOCK PARSING ==================== */
function parseCodeBlocks(text){
  const segments = [];
  const fenceRegex = /```([a-zA-Z0-9+#.\-]*)\n([\s\S]*?)```/g;
  let lastIndex = 0, match;
  while((match = fenceRegex.exec(text)) !== null){
    if(match.index > lastIndex) segments.push({ type:"text", value: text.slice(lastIndex, match.index) });
    segments.push({ type:"code", lang: match[1] || guessLanguage(match[2]), value: match[2].replace(/\n$/, "") });
    lastIndex = fenceRegex.lastIndex;
  }
  if(lastIndex < text.length) segments.push({ type:"text", value: text.slice(lastIndex) });
  return segments;
}
function guessLanguage(code){
  if(/^\s*<\?php/.test(code)) return "php";
  if(/^\s*<(!DOCTYPE|html|div|span|body)/i.test(code)) return "html";
  if(/\bdef\s+\w+\s*\(.*\):/.test(code)) return "python";
  if(/\bfunction\s+\w+\s*\(|=>|const\s+\w+\s*=|let\s+\w+\s*=/.test(code)) return "javascript";
  if(/\bpublic\s+class\b|\bSystem\.out\.println\b/.test(code)) return "java";
  if(/#include\s*<|int\s+main\s*\(/.test(code)) return "c/c++";
  if(/\bSELECT\b[\s\S]*\bFROM\b/i.test(code)) return "sql";
  if(/^\s*\{[\s\S]*\}\s*$/.test(code.trim())) return "json";
  return "code";
}
function escapeHtml(str){ return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderMessageBody(container, content){
  const segments = parseCodeBlocks(content);
  segments.forEach(seg=>{
    if(seg.type === "text"){
      if(seg.value.trim() === "") return;
      const p = document.createElement("div");
      p.className = "msg-text";
      p.textContent = seg.value.trim();
      container.appendChild(p);
    } else {
      const block = document.createElement("div");
      block.className = "code-block";
      const header = document.createElement("div");
      header.className = "code-header";
      const langLabel = document.createElement("span");
      langLabel.textContent = seg.lang;
      header.appendChild(langLabel);

      const actions = document.createElement("div");
      actions.className = "code-actions";
      const copyBtn = document.createElement("button");
      copyBtn.textContent = "Copy";
      copyBtn.addEventListener("click", ()=>{
        navigator.clipboard.writeText(seg.value).then(()=>{
          copyBtn.textContent = "Copied!";
          setTimeout(()=> copyBtn.textContent = "Copy", 1500);
        });
      });
      const fixBtn = document.createElement("button");
      fixBtn.textContent = "Fix this code";
      fixBtn.addEventListener("click", ()=>{
        els.userInput.value = `Fix the error in this ${seg.lang} code:\n\n\`\`\`${seg.lang}\n${seg.value}\n\`\`\``;
        els.userInput.focus();
        refreshSendBtn();
      });
      actions.appendChild(copyBtn);
      actions.appendChild(fixBtn);
      header.appendChild(actions);

      const pre = document.createElement("pre");
      pre.innerHTML = escapeHtml(seg.value);
      block.appendChild(header);
      block.appendChild(pre);
      container.appendChild(block);
    }
  });
}

/* ==================== HISTORY / MESSAGES ==================== */
function renderHistory(){
  const hist = state.histories[state.provider];
  els.chatCol.innerHTML = "";
  if(hist.length === 0){ els.chatCol.appendChild(els.emptyState); return; }
  hist.forEach(m=> appendMessage(m.role, m.content, false, m.media || []));
  scrollToBottom();
}

function scrollToBottom(){
  const scroller = document.querySelector(".chat-scroll");
  scroller.scrollTop = scroller.scrollHeight;
}

function buildActionsRow(role, content, row){
  const actions = document.createElement("div");
  actions.className = "msg-actions";

  const copyBtn = document.createElement("button");
  copyBtn.title = "Copy";
  copyBtn.textContent = "📋";
  copyBtn.addEventListener("click", ()=>{
    navigator.clipboard.writeText(content).then(()=>{
      copyBtn.textContent = "✓";
      setTimeout(()=> copyBtn.textContent = "📋", 1200);
    });
  });
  actions.appendChild(copyBtn);

  const linkBtn = document.createElement("button");
  linkBtn.title = "Copy link";
  linkBtn.textContent = "🔗";
  linkBtn.addEventListener("click", ()=>{
    navigator.clipboard.writeText(location.href);
    linkBtn.textContent = "✓";
    setTimeout(()=> linkBtn.textContent = "🔗", 1200);
  });
  actions.appendChild(linkBtn);

  if(role === "assistant"){
    const upBtn = document.createElement("button");
    upBtn.title = "Good response";
    upBtn.textContent = "👍";
    upBtn.addEventListener("click", ()=>{
      upBtn.classList.toggle("active-up");
      downBtn.classList.remove("active-down");
    });
    const downBtn = document.createElement("button");
    downBtn.title = "Bad response";
    downBtn.textContent = "👎";
    downBtn.addEventListener("click", ()=>{
      downBtn.classList.toggle("active-down");
      upBtn.classList.remove("active-up");
    });
    actions.appendChild(upBtn);
    actions.appendChild(downBtn);

    const regenBtn = document.createElement("button");
    regenBtn.title = "Regenerate";
    regenBtn.textContent = "🔄";
    regenBtn.addEventListener("click", ()=> regenerateFrom(row));
    actions.appendChild(regenBtn);
  }

  const moreBtn = document.createElement("button");
  moreBtn.title = "More";
  moreBtn.textContent = "⋯";
  actions.appendChild(moreBtn);

  return actions;
}

function appendMessage(role, content, scroll=true, mediaList=[]){
  if(els.emptyState.parentNode) els.emptyState.remove();

  const row = document.createElement("div");
  row.className = `row ${role}`;
  row.dataset.searchText = String(content || "").toLowerCase();

  if(role !== "user"){
    const avatar = document.createElement("div");
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === "error" ? "!" : "✦";
    row.appendChild(avatar);
  }

  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap";

  if(role === "assistant"){
    const label = document.createElement("div");
    label.className = "sender-label";
    label.textContent = state.provider.charAt(0).toUpperCase() + state.provider.slice(1);
    wrap.appendChild(label);
  }
  if(role === "error"){
    const label = document.createElement("div");
    label.className = "sender-label";
    label.style.color = "var(--danger)";
    label.textContent = "Error";
    wrap.appendChild(label);
  }

  renderMessageBody(wrap, content);

  if(mediaList.length){
    const mediaWrap = document.createElement("div");
    mediaWrap.className = "msg-media";
    mediaList.forEach(media => {
      const item = document.createElement("div");
      item.className = "media-item";

      if (media.type === "video") {
        const video = document.createElement("video");
        video.src = media.previewUrl;
        video.controls = true;
        video.preload = "metadata";
        video.playsInline = true;
        item.appendChild(video);
      } else {
        const img = document.createElement("img");
        img.src = media.previewUrl;
        img.alt = "Media";
        img.loading = "lazy";
        item.appendChild(img);
      }

      mediaWrap.appendChild(item);
    });
    wrap.appendChild(mediaWrap);
  }

  if(role === "assistant" || role === "error"){
    wrap.appendChild(buildActionsRow(role, content, row));
  }

  row.appendChild(wrap);
  els.chatCol.appendChild(row);
  if(scroll) scrollToBottom();
  return row;
}

function appendTyping(){
  const row = document.createElement("div");
  row.className = "row assistant";
  row.id = "typingIndicator";
  row.innerHTML = `
    <div class="avatar assistant">✦</div>
    <div class="bubble-wrap">
      <div class="sender-label">${state.provider.charAt(0).toUpperCase() + state.provider.slice(1)}</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
  els.chatCol.appendChild(row);
  scrollToBottom();
}
function removeTyping(){ const el = document.getElementById("typingIndicator"); if(el) el.remove(); }

els.clearBtn.addEventListener("click", ()=>{
  state.histories[state.provider] = [];
  renderHistory();
});

/* ==================== INPUT / SEND ==================== */
function refreshSendBtn(){
  const hasText = els.userInput.value.trim().length > 0 || pendingMedia.length > 0;
  els.sendBtn.classList.toggle("mic-mode", !hasText);
  els.sendBtn.innerHTML = hasText ? '<i class="ri ri-send-plane-2-line"></i>' : '<i class="ri ri-mic-line"></i>';
  els.sendBtn.title = hasText ? "Send" : "Voice";
}

els.userInput.addEventListener("keydown", (e)=>{
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});
els.userInput.addEventListener("input", ()=>{
  els.userInput.style.height = "auto";
  els.userInput.style.height = Math.min(els.userInput.scrollHeight, 200) + "px";
  refreshSendBtn();
});
els.sendBtn.addEventListener("click", ()=>{
  if(els.sendBtn.classList.contains("mic-mode")) return; // voice not wired up
  sendMessage();
});

async function callBackend(provider, model, messages){
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ provider, model, messages })
  });
  const data = await res.json();
  if(!res.ok) throw new Error(data.error || `Server error (${res.status})`);
  return data;
}

async function regenerateFrom(row){
  const provider = state.provider;
  const hist = state.histories[provider];
  const idx = Array.from(els.chatCol.children).indexOf(row);
  // find corresponding history index (assumes 1:1 order with rendered rows)
  if(idx < 0 || idx >= hist.length) return;

  const upTo = hist.slice(0, idx); // everything before this assistant message
  appendTyping();
  try{
    const model = els.modelSelect.value;
    const messagesWithMedia = upTo.map(m => ({
      role: m.role,
      content: m.content,
      media: m.media ? m.media.map(mm => ({ base64: mm.base64, mimeType: mm.mimeType, type: mm.type })) : undefined
    }));
    const data = await callBackend(provider, model, messagesWithMedia);
    removeTyping();
    hist[idx] = { role: "assistant", content: data.reply };
    renderHistory();
  } catch(err){
    removeTyping();
    appendMessage("error", err.message || String(err));
  }
}

async function sendMessage(){
  const text = els.userInput.value.trim();
  if(!text && pendingMedia.length === 0) return;

  const provider = state.provider;
  const model = els.modelSelect.value;
  const mediaForThisMsg = pendingMedia.slice();

  state.histories[provider].push({
    role:"user",
    content:text,
    media: mediaForThisMsg.map(m => ({
      type: m.type,
      previewUrl: m.previewUrl,
      base64: m.base64,
      mimeType: m.mimeType
    }))
  });
  appendMessage("user", text, true, mediaForThisMsg);
  els.userInput.value = "";
  els.userInput.style.height = "auto";
  pendingMedia = [];
  renderAttachmentsBar();
  refreshSendBtn();
  els.sendBtn.disabled = true;
  appendTyping();

  try{
    const messagesWithMedia = state.histories[provider].map(m => ({
      role: m.role,
      content: m.content,
      media: m.media ? m.media.map(mm => ({
        base64: mm.base64,
        mimeType: mm.mimeType,
        type: mm.type
      })) : undefined
    }));

    const data = await callBackend(provider, model, messagesWithMedia);
    removeTyping();

    state.histories[provider].push({ role:"assistant", content:data.reply });
    appendMessage("assistant", data.reply);
  } catch(err){
    removeTyping();
    appendMessage("error", err.message || String(err));
  } finally {
    els.sendBtn.disabled = false;
  }
}

populateModels();
loadStatus();
refreshSendBtn();
</script>
