<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>DeepSeek · Multi‑AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" />
    <style>
        /* ===== RESET & ROOT ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #0d0d12;
            --bg-soft: #14141c;
            --bg-input: #1a1a24;
            --bg-hover: rgba(255, 255, 255, .04);
            --border: rgba(255, 255, 255, .06);
            --border-light: rgba(255, 255, 255, .08);
            --text: #ececf0;
            --text-secondary: #9a9aaa;
            --text-muted: #6b6b7a;
            --accent: #4f8cff;
            --accent-soft: rgba(79, 140, 255, .12);
            --radius: 20px;
            --radius-sm: 12px;
            --sidebar-w: 260px;
            --topbar-h: 56px;
            --shadow: 0 20px 60px rgba(0, 0, 0, .6);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            font-size: 15px;
            line-height: 1.5;
            touch-action: manipulation;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .12);
            border-radius: 10px;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--bg-soft);
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px 12px;
            border-right: 1px solid var(--border);
            transition: transform .25s cubic-bezier(.4, 0, .2, 1);
            z-index: 40;
            flex-shrink: 0;
            overflow-y: auto;
            position: relative;
        }
        .sidebar.collapsed {
            transform: translateX(-100%);
            margin-left: 0;
        }
        @media (min-width: 901px) {
            .sidebar.collapsed {
                transform: translateX(0);
                margin-left: calc(-1 * var(--sidebar-w));
            }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 4px 20px;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -.2px;
            color: var(--text);
            flex-shrink: 0;
        }
        .brand .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #4f8cff, #6c5ce7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            flex-shrink: 0;
        }
        .brand span {
            background: linear-gradient(135deg, #fff 60%, #4f8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .collapse-btn {
            margin-left: auto;
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background .15s;
            flex-shrink: 0;
        }
        .collapse-btn:hover {
            background: var(--bg-hover);
            color: var(--text);
        }
        @media (max-width: 900px) {
            .collapse-btn {
                display: none;
            }
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background .2s, transform .15s;
            width: 100%;
            margin-bottom: 18px;
            flex-shrink: 0;
            touch-action: manipulation;
        }
        .new-chat-btn:active {
            transform: scale(.97);
        }
        .new-chat-btn:hover {
            background: #3a7ae0;
        }
        .new-chat-btn i {
            font-size: 18px;
        }

        .nav-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-muted);
            padding: 14px 10px 6px;
            flex-shrink: 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: background .15s;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            touch-action: manipulation;
        }
        .nav-item:active {
            background: var(--bg-hover);
        }
        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text);
        }
        .nav-item i {
            font-size: 18px;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
        }

        .provider-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 13.5px;
            cursor: pointer;
            transition: background .15s, color .15s;
            border: 1px solid transparent;
            background: transparent;
            width: 100%;
            text-align: left;
            margin-bottom: 2px;
            touch-action: manipulation;
        }
        .provider-item:active {
            background: var(--bg-hover);
        }
        .provider-item:hover {
            background: var(--bg-hover);
            color: var(--text);
        }
        .provider-item.active {
            background: var(--accent-soft);
            color: var(--text);
            border-color: rgba(79, 140, 255, .25);
        }
        .provider-item .provider-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: rgba(255, 255, 255, .05);
        }
        .provider-item .provider-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }
        .provider-item .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .provider-item .status {
            margin-left: auto;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status.ok {
            background: #3dd68c;
        }
        .status.missing {
            background: #ff7278;
        }
        .free-badge {
            font-size: 7.5px;
            background: rgba(79, 140, 255, .15);
            color: var(--accent);
            padding: 1px 8px;
            border-radius: 999px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .3px;
            flex-shrink: 0;
        }

        .history-list {
            margin-top: 8px;
            padding: 4px 0;
            flex: 1;
            overflow-y: auto;
            min-height: 40px;
        }
        .history-item {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background .15s;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            touch-action: manipulation;
        }
        .history-item:active {
            background: var(--bg-hover);
        }
        .history-item i {
            font-size: 14px;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .history-item:hover {
            background: var(--bg-hover);
            color: var(--text);
        }
        .history-item.active-history {
            background: var(--accent-soft);
            color: var(--text);
            border-left: 2px solid var(--accent);
        }
        .history-item .chat-preview {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 11px 14px;
            background: rgba(79, 140, 255, .12);
            color: var(--accent);
            font-weight: 600;
            font-size: 13px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            transition: background .2s;
            border: 1px solid rgba(79, 140, 255, .15);
            touch-action: manipulation;
        }
        .download-btn:active {
            background: rgba(79, 140, 255, .25);
        }
        .download-btn:hover {
            background: rgba(79, 140, 255, .2);
        }
        .download-btn i {
            font-size: 18px;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 8px;
            border-radius: var(--radius-sm);
            margin-top: 8px;
            transition: background .15s;
            cursor: pointer;
            touch-action: manipulation;
        }
        .user-row:active {
            background: var(--bg-hover);
        }
        .user-row:hover {
            background: var(--bg-hover);
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f8cff, #6c5ce7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            color: #fff;
            flex-shrink: 0;
        }
        .user-meta {
            overflow: hidden;
            flex: 1;
        }
        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-email {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .footer-note {
            font-size: 10px;
            color: var(--text-muted);
            padding: 4px 8px;
            line-height: 1.5;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        /* ===== OVERLAY ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            z-index: 35;
            display: none;
            touch-action: none;
        }
        .overlay.show {
            display: block;
        }

        /* ===== MAIN ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: 0;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 0 16px;
            height: var(--topbar-h);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: rgba(13, 13, 18, .7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            min-height: var(--topbar-h);
        }
        .topbar .hamburger {
            display: none;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
            padding: 4px 6px;
            touch-action: manipulation;
        }
        @media (max-width: 900px) {
            .topbar .hamburger {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .model-picker {
            position: relative;
            flex: 1 1 180px;
            min-width: 100px;
            max-width: 280px;
        }
        .model-picker select {
            appearance: none;
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            padding: 7px 32px 7px 12px;
            border-radius: 999px;
            cursor: pointer;
            outline: none;
            width: 100%;
            touch-action: manipulation;
        }
        .model-picker select:hover {
            border-color: rgba(255, 255, 255, .15);
        }
        .model-picker::after {
            content: "\f4e5";
            font-family: "remixicon";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-55%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 13px;
        }
        @media (max-width: 700px) {
            .model-picker {
                flex: 1 1 100%;
                max-width: 100%;
                order: 2;
            }
            .model-picker select {
                font-size: 14px;
                padding: 8px 32px 8px 14px;
            }
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        @media (max-width: 700px) {
            .topbar-actions {
                order: 1;
            }
        }

        .topbar-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 12px;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 4px;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .topbar-btn:active {
            background: var(--bg-hover);
        }
        .topbar-btn:hover {
            border-color: rgba(255, 255, 255, .2);
            color: var(--text);
        }
        .topbar-btn i {
            font-size: 13px;
        }
        @media (max-width: 500px) {
            .topbar-btn span {
                display: none;
            }
            .topbar-btn {
                padding: 5px 10px;
            }
        }

        .icon-btn-sm {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all .15s;
            touch-action: manipulation;
        }
        .icon-btn-sm:active {
            background: var(--bg-hover);
        }
        .icon-btn-sm:hover {
            border-color: rgba(255, 255, 255, .2);
            color: var(--text);
            background: var(--bg-hover);
        }

        /* ===== CHAT ===== */
        .chat-scroll {
            flex: 1;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            padding: 12px 0;
            -webkit-overflow-scrolling: touch;
        }
        .chat-col {
            width: 100%;
            max-width: 760px;
            padding: 0 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        @media (min-width: 600px) {
            .chat-col {
                padding: 0 28px 30px;
                gap: 22px;
            }
        }

        .empty-hero {
            margin: auto;
            text-align: center;
            padding: 30px 16px;
            max-width: 440px;
        }
        .empty-hero .icon-big {
            font-size: 44px;
            margin-bottom: 12px;
            display: block;
            color: var(--accent);
        }
        .empty-hero h1 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 8px;
            letter-spacing: -.2px;
        }
        .empty-hero p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }
        .empty-hero kbd {
            background: var(--bg-input);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 10px;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        @media (max-width: 500px) {
            .empty-hero h1 {
                font-size: 19px;
            }
            .empty-hero .icon-big {
                font-size: 36px;
            }
        }

        /* ===== MESSAGES ===== */
        .row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .row.user {
            flex-direction: row-reverse;
        }
        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            margin-top: 2px;
            color: #fff;
        }
        @media (min-width: 600px) {
            .avatar {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
        }
        .avatar.assistant {
            background: linear-gradient(135deg, #4f8cff, #6c5ce7);
        }
        .avatar.error {
            background: rgba(255, 107, 107, .15);
            color: #ff7278;
        }
        .avatar.user {
            background: rgba(255, 255, 255, .06);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .bubble-wrap {
            max-width: 88%;
            min-width: 0;
        }
        @media (min-width: 600px) {
            .bubble-wrap {
                max-width: 85%;
            }
        }
        .row.user .bubble-wrap {
            background: var(--bg-input);
            padding: 12px 16px;
            border-radius: 18px 18px 12px 18px;
            border: 1px solid var(--border);
        }
        .row.assistant .bubble-wrap,
        .row.error .bubble-wrap {
            padding: 12px 16px;
            flex: 1;
            min-width: 0;
            border-radius: 18px 18px 12px 12px;
        }
        .row.assistant .bubble-wrap {
            background: rgba(255, 255, 255, .02);
            border: 1px solid var(--border);
        }
        @media (min-width: 600px) {
            .row.user .bubble-wrap {
                padding: 14px 18px;
                border-radius: 20px 20px 12px 20px;
            }
            .row.assistant .bubble-wrap,
            .row.error .bubble-wrap {
                padding: 14px 18px;
                border-radius: 20px 20px 12px 12px;
            }
        }

        .sender-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: .3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        @media (min-width: 600px) {
            .sender-label {
                font-size: 11px;
                margin-bottom: 8px;
            }
        }
        .msg-text {
            white-space: pre-wrap;
            line-height: 1.6;
            word-wrap: break-word;
            font-size: 14px;
        }
        @media (min-width: 600px) {
            .msg-text {
                font-size: 15px;
                line-height: 1.7;
            }
        }
        .row.error .msg-text {
            color: #ff7278;
        }

        /* ===== CODE BLOCKS ===== */
        .code-block {
            margin: 12px 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #0a0a0f;
        }
        .code-block .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: rgba(255, 255, 255, .02);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-secondary);
            flex-wrap: wrap;
            gap: 4px;
        }
        .code-block .code-actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .code-block .code-actions button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 3px;
            touch-action: manipulation;
        }
        .code-block .code-actions button:active {
            background: var(--bg-hover);
        }
        .code-block .code-actions button:hover {
            border-color: var(--accent);
            color: var(--text);
        }
        .code-block .code-actions button i {
            font-size: 11px;
        }
        .code-block pre {
            margin: 0;
            padding: 12px;
            overflow-x: auto;
            font-family: 'SF Mono', Consolas, monospace;
            font-size: 12px;
            line-height: 1.5;
            color: #e4e4ea;
            -webkit-overflow-scrolling: touch;
        }
        @media (min-width: 600px) {
            .code-block pre {
                padding: 16px;
                font-size: 13px;
            }
        }

        /* ===== MESSAGE ACTIONS ===== */
        .msg-actions {
            display: flex;
            align-items: center;
            gap: 2px;
            margin-top: 10px;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        .msg-actions button {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all .15s;
            touch-action: manipulation;
        }
        .msg-actions button:active {
            background: var(--bg-hover);
        }
        .msg-actions button:hover {
            background: var(--bg-hover);
            color: var(--text);
        }
        .msg-actions button.active-like {
            color: #3dd68c;
        }
        .msg-actions button.active-dislike {
            color: #ff7278;
        }
        @media (min-width: 600px) {
            .msg-actions button {
                width: 30px;
                height: 30px;
                font-size: 15px;
            }
        }

        /* ===== TYPING ===== */
        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: pulse 1.3s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: .2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: .4s;
        }
        @keyframes pulse {
            0%,
            80%,
            100% {
                opacity: .2;
                transform: scale(.8);
            }
            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ===== COMPOSER ===== */
        .composer-wrap {
            display: flex;
            justify-content: center;
            padding: 8px 12px 12px;
            flex-shrink: 0;
            padding-bottom: calc(12px + var(--safe-bottom));
        }
        @media (min-width: 600px) {
            .composer-wrap {
                padding: 12px 24px 20px;
            }
        }

        .composer {
            width: 100%;
            max-width: 760px;
            border-radius: var(--radius);
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px 14px 10px;
            transition: border-color .2s;
        }
        .composer:focus-within {
            border-color: rgba(79, 140, 255, .3);
        }
        @media (min-width: 600px) {
            .composer {
                padding: 16px 18px 14px;
            }
        }

        .attachments {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .thumb {
            position: relative;
            width: 56px;
            height: 56px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #0a0a0f;
            flex-shrink: 0;
        }
        @media (min-width: 600px) {
            .thumb {
                width: 64px;
                height: 64px;
                border-radius: 14px;
            }
        }
        .thumb img,
        .thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .thumb .remove {
            position: absolute;
            top: 3px;
            right: 3px;
            width: 18px;
            height: 18px;
            background: rgba(0, 0, 0, .7);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            touch-action: manipulation;
        }
        .thumb .remove:active {
            background: #ff7278;
        }
        .thumb .remove:hover {
            background: #ff7278;
        }
        .thumb .file-badge {
            position: absolute;
            bottom: 3px;
            right: 3px;
            background: rgba(0, 0, 0, .6);
            color: #fff;
            font-size: 8px;
            padding: 1px 5px;
            border-radius: 5px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .thumb .file-badge i {
            font-size: 8px;
        }

        .input-shell {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-shell textarea {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            min-height: 24px;
            max-height: 140px;
            padding: 2px 0;
            line-height: 1.5;
            width: 100%;
            touch-action: manipulation;
        }
        @media (min-width: 600px) {
            .input-shell textarea {
                font-size: 15px;
                min-height: 28px;
                max-height: 180px;
                padding: 2px 0;
            }
        }
        .input-shell textarea::placeholder {
            color: var(--text-muted);
        }

        .composer-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }
        .composer-left {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .composer-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            transition: all .15s;
            flex-shrink: 0;
            touch-action: manipulation;
        }
        .icon-btn:active {
            background: var(--bg-hover);
        }
        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text);
        }
        .icon-btn.disabled {
            opacity: .3;
            cursor: not-allowed;
            pointer-events: none;
        }
        @media (min-width: 600px) {
            .icon-btn {
                width: 34px;
                height: 34px;
                font-size: 18px;
            }
        }

        .fast-pill {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            background: transparent;
            transition: all .15s;
            touch-action: manipulation;
        }
        .fast-pill:active {
            background: var(--bg-hover);
        }
        .fast-pill:hover {
            background: var(--bg-hover);
            border-color: var(--border-light);
        }
        .fast-pill i {
            font-size: 13px;
        }
        @media (min-width: 600px) {
            .fast-pill {
                padding: 6px 14px;
                font-size: 12px;
            }
            .fast-pill i {
                font-size: 14px;
            }
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            transition: all .2s;
            flex-shrink: 0;
            touch-action: manipulation;
        }
        .send-btn:active {
            transform: scale(.94);
        }
        .send-btn:disabled {
            opacity: .3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .send-btn:not(:disabled):hover {
            background: #3a7ae0;
            transform: scale(1.02);
        }
        .send-btn.mic-mode {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .send-btn.mic-mode:hover {
            background: var(--bg-hover);
            border-color: var(--border-light);
            color: var(--text);
        }
        @media (min-width: 600px) {
            .send-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }

        .footnote {
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 8px;
            opacity: .6;
        }
        @media (min-width: 600px) {
            .footnote {
                font-size: 11px;
                margin-top: 10px;
            }
        }
        .paste-hint {
            text-align: center;
            font-size: 9px;
            color: var(--text-muted);
            margin-top: 3px;
            opacity: .4;
        }
        @media (min-width: 600px) {
            .paste-hint {
                font-size: 10px;
                margin-top: 4px;
            }
        }
        .paste-hint kbd {
            background: var(--bg-input);
            padding: 0 5px;
            border-radius: 3px;
            border: 1px solid var(--border);
            font-size: 8px;
        }

        /* ===== SEARCH PANEL ===== */
        .search-panel {
            position: fixed;
            top: 56px;
            left: 50%;
            transform: translateX(-50%);
            width: min(92%, 600px);
            background: var(--bg-soft);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            z-index: 100;
            display: none;
            box-shadow: var(--shadow);
            max-height: 70vh;
            overflow: hidden;
        }
        .search-panel.active {
            display: block;
        }
        .search-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .search-header span {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .search-header span i {
            font-size: 15px;
        }
        .search-panel input {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 14px;
            outline: none;
            touch-action: manipulation;
        }
        .search-panel input:focus {
            border-color: var(--accent);
        }
        .search-results {
            margin-top: 12px;
            max-height: 280px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .search-result {
            width: 100%;
            text-align: left;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background .15s;
            touch-action: manipulation;
        }
        .search-result:active {
            background: var(--bg-hover);
        }
        .search-result:hover {
            background: var(--bg-hover);
        }
        .result-role {
            font-size: 10px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .result-role i {
            font-size: 11px;
        }
        .result-text {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        .no-results {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            font-size: 13px;
        }
        .highlight {
            animation: glow 2s;
        }
        @keyframes glow {
            0% {
                background: rgba(79, 140, 255, .15);
            }
            100% {
                background: transparent;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                width: 280px;
                max-width: 80vw;
                box-shadow: var(--shadow);
                height: 100vh;
                border-right: 1px solid var(--border);
                border-radius: 0 16px 16px 0;
                transform: translateX(-100%);
                transition: transform .3s cubic-bezier(.4, 0, .2, 1);
                padding: 16px 12px;
            }
            .sidebar:not(.collapsed) {
                transform: translateX(0);
            }
            .sidebar.collapsed {
                transform: translateX(-100%);
            }
            .topbar .hamburger {
                display: flex;
            }
            .topbar {
                padding: 0 12px;
            }
            .model-picker {
                flex: 1 1 140px;
                min-width: 80px;
            }
            .model-picker select {
                font-size: 12px;
                padding: 6px 28px 6px 10px;
            }
        }

        @media (max-width: 700px) {
            .topbar {
                flex-wrap: wrap;
                gap: 6px;
                padding: 6px 12px;
                height: auto;
                min-height: 50px;
            }
            .model-picker {
                flex: 1 1 100%;
                order: 2;
                max-width: 100%;
            }
            .model-picker select {
                font-size: 13px;
                padding: 7px 32px 7px 12px;
            }
            .topbar-actions {
                order: 1;
                flex: 0 1 auto;
                gap: 4px;
            }
            .topbar-btn {
                padding: 4px 10px;
                font-size: 11px;
            }
            .topbar-btn i {
                font-size: 12px;
            }
            .icon-btn-sm {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
            .chat-col {
                padding: 0 10px 16px;
                gap: 14px;
            }
            .composer-wrap {
                padding: 6px 10px 10px;
            }
            .composer {
                padding: 10px 12px 8px;
                border-radius: 16px;
            }
            .row.user .bubble-wrap {
                max-width: 92%;
            }
            .bubble-wrap {
                max-width: 92%;
            }
            .search-panel {
                top: 50px;
                width: 96%;
                padding: 12px 14px;
            }
            .search-results {
                max-height: 200px;
            }
            .empty-hero {
                padding: 20px 12px;
            }
            .empty-hero h1 {
                font-size: 18px;
            }
            .empty-hero p {
                font-size: 13px;
            }
        }

        @media (max-width: 500px) {
            .sidebar {
                width: 100vw;
                max-width: 100vw;
                border-radius: 0;
                padding: 12px 10px;
            }
            .sidebar:not(.collapsed) {
                transform: translateX(0);
            }
            .sidebar.collapsed {
                transform: translateX(-100%);
            }
            .topbar .hamburger {
                font-size: 18px;
                padding: 2px 4px;
            }
            .model-picker select {
                font-size: 12px;
                padding: 5px 26px 5px 10px;
            }
            .topbar-btn {
                padding: 3px 8px;
                font-size: 10px;
            }
            .topbar-btn span {
                display: none;
            }
            .icon-btn-sm {
                width: 28px;
                height: 28px;
                font-size: 13px;
            }
            .send-btn {
                width: 34px;
                height: 34px;
                font-size: 15px;
            }
            .icon-btn {
                width: 28px;
                height: 28px;
                font-size: 15px;
            }
            .fast-pill {
                font-size: 10px;
                padding: 4px 8px;
            }
            .fast-pill i {
                font-size: 12px;
            }
            .composer {
                padding: 8px 10px 6px;
                border-radius: 14px;
            }
            .input-shell textarea {
                font-size: 13px;
                min-height: 20px;
                max-height: 100px;
            }
            .chat-col {
                padding: 0 8px 12px;
                gap: 12px;
            }
            .row {
                gap: 6px;
            }
            .avatar {
                width: 24px;
                height: 24px;
                font-size: 11px;
                border-radius: 8px;
            }
            .row.user .bubble-wrap {
                padding: 10px 12px;
                border-radius: 16px 16px 10px 16px;
            }
            .row.assistant .bubble-wrap,
            .row.error .bubble-wrap {
                padding: 10px 12px;
                border-radius: 16px 16px 10px 10px;
            }
            .msg-text {
                font-size: 13px;
                line-height: 1.5;
            }
            .sender-label {
                font-size: 9px;
                margin-bottom: 4px;
            }
            .msg-actions {
                margin-top: 6px;
                gap: 1px;
            }
            .msg-actions button {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }
            .code-block pre {
                font-size: 11px;
                padding: 10px;
            }
            .code-block .code-header {
                font-size: 10px;
                padding: 4px 10px;
            }
            .code-block .code-actions button {
                font-size: 9px;
                padding: 2px 6px;
            }
            .thumb {
                width: 48px;
                height: 48px;
                border-radius: 10px;
            }
            .footnote {
                font-size: 9px;
                margin-top: 6px;
            }
            .paste-hint {
                font-size: 8px;
            }
            .empty-hero .icon-big {
                font-size: 32px;
            }
            .empty-hero h1 {
                font-size: 17px;
            }
            .empty-hero p {
                font-size: 12px;
            }
            .search-panel {
                top: 44px;
                padding: 10px 12px;
                border-radius: 14px;
            }
            .search-panel input {
                font-size: 13px;
                padding: 8px 12px;
            }
            .search-result {
                padding: 8px 10px;
            }
            .result-text {
                font-size: 11px;
            }
            .brand {
                font-size: 14px;
                padding: 0 2px 14px;
            }
            .brand .logo {
                width: 28px;
                height: 28px;
                font-size: 16px;
            }
            .new-chat-btn {
                font-size: 13px;
                padding: 10px 14px;
                gap: 8px;
                margin-bottom: 12px;
            }
            .nav-item {
                font-size: 13px;
                padding: 8px 12px;
            }
            .provider-item {
                font-size: 12.5px;
                padding: 8px 12px;
            }
            .history-item {
                font-size: 12px;
                padding: 8px 12px;
            }
            .download-btn {
                font-size: 12px;
                padding: 9px 12px;
            }
            .user-row {
                padding: 8px 6px;
            }
            .user-avatar {
                width: 28px;
                height: 28px;
                font-size: 11px;
            }
            .user-name {
                font-size: 12px;
            }
            .user-email {
                font-size: 10px;
            }
            .footer-note {
                font-size: 9px;
                padding: 2px 6px;
            }
        }

        @media (max-width: 380px) {
            .composer-right .icon-btn:not(.send-btn) {
                display: none;
            }
            .topbar {
                padding: 4px 8px;
                min-height: 44px;
            }
            .model-picker select {
                font-size: 11px;
                padding: 4px 22px 4px 8px;
            }
            .topbar-btn {
                font-size: 9px;
                padding: 2px 6px;
            }
            .topbar-btn i {
                font-size: 11px;
            }
            .icon-btn-sm {
                width: 26px;
                height: 26px;
                font-size: 12px;
            }
            .send-btn {
                width: 30px;
                height: 30px;
                font-size: 13px;
            }
            .composer {
                padding: 6px 8px 4px;
            }
            .input-shell textarea {
                font-size: 12px;
                min-height: 18px;
            }
            .fast-pill {
                font-size: 9px;
                padding: 3px 6px;
            }
            .fast-pill i {
                font-size: 10px;
            }
            .icon-btn {
                width: 26px;
                height: 26px;
                font-size: 13px;
            }
            .chat-col {
                padding: 0 6px 10px;
                gap: 10px;
            }
            .avatar {
                width: 22px;
                height: 22px;
                font-size: 10px;
            }
            .msg-text {
                font-size: 12px;
            }
            .bubble-wrap {
                max-width: 95%;
            }
            .row.user .bubble-wrap {
                padding: 8px 10px;
            }
            .row.assistant .bubble-wrap,
            .row.error .bubble-wrap {
                padding: 8px 10px;
            }
        }

        /* ===== SAFE AREA ===== */
        @supports (padding: max(0px)) {
            .composer-wrap {
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
            .sidebar {
                padding-bottom: max(16px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <!-- SIDEBAR -->

            <span class="status" id="dot-groq"></span>
        </button>

        <button class="provider-item" data-provider="openrouter">

            OpenRouter

            <span class="status" id="dot-openrouter"></span>

            </span>
            Grok

                <span style="display:inline-flex;align-items:center;gap:4px;margin-left:4px;">
