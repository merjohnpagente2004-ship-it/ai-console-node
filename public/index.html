                    <span style="color:var(--danger);margin-left:2px;">●</span> Missing
                </span>
            </div>
            <div class="user-row">
                <div class="user-avatar">A</div>
                <div class="user-meta">
                    <div class="user-name">Admin 11</div>
                    <div class="user-email">merjohnpagente2004@gmail.com</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <header class="topbar">
            <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu"><i class="ri ri-menu-line"></i></button>
            <div class="model-picker">
                <select id="modelSelect"></select>
            </div>
            <div class="topbar-actions">
                <button class="topbar-btn" id="clearBtn"><i class="ri ri-delete-bin-line"></i> <span>Clear</span></button>
                <button class="icon-btn-sm" id="searchBtn" title="Search"><i class="ri ri-search-line"></i></button>
            </div>
        </header>

        <!-- SEARCH PANEL -->
        <div class="search-panel" id="searchPanel">
            <div class="search-header">
                <span><i class="ri ri-search-line"></i> Search history</span>
                <button class="icon-btn-sm" id="closeSearchBtn" style="border:none;width:30px;height:30px;" aria-label="Close search"><i class="ri ri-close-line"></i></button>
            </div>
            <input id="searchInput" type="search" placeholder="Type to search..." autocomplete="off" aria-label="Search messages" />
            <div class="search-results" id="searchResults">
                <div class="no-results"><i class="ri ri-information-line"></i> Search for messages in this chat.</div>
            </div>
        </div>

        <!-- CHAT -->
        <div class="chat-scroll" id="chatScroll">
            <div class="chat-col" id="chatCol">
                <div class="empty-hero" id="emptyState">
                    <span class="icon-big"><i class="ri ri-sparkle-fill"></i></span>
                    <h1>Multiple ai What can i help you?</h1>
                    <p>Choose a provider, then start typing below.</p>
                    <p style="font-size:12px;margin-top:6px;">
                        <i class="ri ri-image-line"></i>
                    </p>
                </div>
            </div>
        </div>

        <!-- COMPOSER -->
        <div class="composer-wrap">
            <div class="composer" id="composer">
                <div class="attachments" id="attachmentsBar"></div>
                <div class="input-shell">
                    <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display:none;" />
                    <textarea id="userInput" placeholder="Ask anything…" rows="1" aria-label="Message input"></textarea>
                    <div class="composer-bottom">
                        <div class="composer-left">
                            <button class="icon-btn" id="attachBtn" title="Attach"><i class="ri ri-attachment-2"></i></button>
                            <button class="fast-pill" id="fastPill"><i class="ri ri-flashlight-line"></i> Fast</button>
                        </div>
                        <div class="composer-right">
                            <button class="send-btn mic-mode" id="sendBtn" aria-label="Send message"><i class="ri ri-mic-line"></i></button>
                        </div>
                    </div>
                </div>
        </div>
    </main>

    <script>
        // ============================================================
        //  CONFIG
        // ============================================================
        const MODELS = {
            gemini: [
                { id: "gemini-2.5-flash", label: "Gemini 2.5 Flash" },
                { id: "gemini-2.5-flash-lite", label: "Gemini 2.5 Flash-Lite" },
                { id: "gemini-2.5-pro", label: "Gemini 2.5 Pro" }
            ],
            groq: [
                { id: "llama-3.3-70b-versatile", label: "Llama 3.3 70B" },
                { id: "llama-3.1-8b-instant", label: "Llama 3.1 8B" },
                { id: "mixtral-8x7b-32768", label: "Mixtral 8x7B" }
            ],
            openrouter: [
                { id: "openrouter/free", label: "Auto Free Router" },
                { id: "openai/gpt-oss-120b:free", label: "GPT-OSS 120B" },
                { id: "google/gemma-4-31b-it:free", label: "Gemma 4 31B" }
            ],
            grok: [
                { id: "grok-4.3", label: "Grok 4.3" }
            ],
            zenmux: [
                { id: "anthropic/claude-fable-5-free", label: "Claude Fable 5" }
            ]
        };

        const VISION_MODELS = new Set([
            "gemini-2.5-flash",
            "gemini-2.5-flash-lite",
            "gemini-2.5-pro",
            "grok-4.3"
        ]);

        // ============================================================
        //  STATE
        // ============================================================
        let chatHistory = [];
        let currentChatId = null;
        const state = {
            provider: "gemini",
            pendingMedia: []
        };

        // ============================================================
        //  localStorage HELPERS
        // ============================================================
        function loadChatsFromStorage() {
            try {
                const stored = localStorage.getItem('deepseek_chat_history');
                if (stored) {
                    chatHistory = JSON.parse(stored);
                    chatHistory = chatHistory.filter(chat => chat && chat.id);
                    return true;
                }
            } catch (e) { console.warn('Failed to load chats:', e); }
            return false;
        }

        function saveChatsToStorage() {
            try {
                localStorage.setItem('deepseek_chat_history', JSON.stringify(chatHistory));
                updateChatCount();
            } catch (e) { console.warn('Failed to save chats:', e); }
        }

        function generateChatId() {
            return 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        }

        function getCurrentChat() {
            return chatHistory.find(c => c.id === currentChatId) || null;
        }

        function updateChatCount() {
            const el = document.getElementById('chatCount');
            if (el) el.textContent = chatHistory.length + ' chat' + (chatHistory.length !== 1 ? 's' : '');
        }

        // ============================================================
        //  DOM REFS
        // ============================================================
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        const els = {
            providerBtns: $$(".provider-item"),
            modelSelect: $("#modelSelect"),
            chatCol: $("#chatCol"),
            emptyState: $("#emptyState"),
            userInput: $("#userInput"),
            sendBtn: $("#sendBtn"),
            clearBtn: $("#clearBtn"),
            fileInput: $("#fileInput"),
            attachBtn: $("#attachBtn"),
            attachmentsBar: $("#attachmentsBar"),
            sidebar: $("#sidebar"),
            overlay: $("#overlay"),
            hamburgerBtn: $("#hamburgerBtn"),
            newChatBtn: $("#newChatBtn"),
            searchBtn: $("#searchBtn"),
            searchPanel: $("#searchPanel"),
            closeSearchBtn: $("#closeSearchBtn"),
            searchInput: $("#searchInput"),
            searchResults: $("#searchResults"),
            fastPill: $("#fastPill"),
            chatScroll: $("#chatScroll"),
            historyList: $("#historyList"),
            seeAllBtn: $("#seeAllBtn"),
            collapseBtn: $("#collapseBtn"),
        };

        // ============================================================
        //  SIDEBAR
        // ============================================================
        function isMobile() { return window.innerWidth <= 900; }

        function openSidebar() {
            els.sidebar.classList.remove("collapsed");
            if (isMobile()) els.overlay.classList.add("show");
            document.body.style.overflow = isMobile() ? 'hidden' : '';
        }

        function closeSidebar() {
            els.sidebar.classList.add("collapsed");
            els.overlay.classList.remove("show");
            document.body.style.overflow = '';
        }

        function toggleSidebar() {
            if (els.sidebar.classList.contains("collapsed") || isMobile()) {
                openSidebar();
            } else {
                closeSidebar();
            }
        }

        els.collapseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isMobile()) {
                closeSidebar();
            } else {
                els.sidebar.classList.toggle('collapsed');
            }
        });

        els.hamburgerBtn.addEventListener('click', toggleSidebar);
        els.overlay.addEventListener('click', closeSidebar);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !els.sidebar.classList.contains('collapsed') && isMobile()) {
                closeSidebar();
            }
        });

        function applyResponsiveDefault() {
            if (isMobile()) {
                closeSidebar();
            } else {
                els.sidebar.classList.remove('collapsed');
                els.overlay.classList.remove('show');
                document.body.style.overflow = '';
            }
        }
        window.addEventListener('resize', applyResponsiveDefault);
        applyResponsiveDefault();

        // ============================================================
        //  PROVIDER & MODELS
        // ============================================================
        async function loadStatus() {
            try {
                const res = await fetch("/api/status");
                const status = await res.json();
                setDot("gemini", status.geminiConfigured);
                setDot("groq", status.groqConfigured);
                setDot("openrouter", status.openrouterConfigured);
                setDot("grok", status.grokConfigured);
                setDot("zenmux", status.zenmuxConfigured);
            } catch (_) { console.warn("Status fetch failed"); }
        }

        function setDot(provider, ok) {
            const dot = document.getElementById(`dot-${provider}`);
            if (dot) dot.className = "status " + (ok ? "ok" : "missing");
        }

        function populateModels() {
            els.modelSelect.innerHTML = "";
            MODELS[state.provider].forEach(m => {
                const opt = document.createElement("option");
                opt.value = m.id;
                opt.textContent = m.label;
                els.modelSelect.appendChild(opt);
            });
            refreshVisionUI();
        }

        els.modelSelect.addEventListener("change", refreshVisionUI);

        function refreshVisionUI() {
            const model = els.modelSelect.value;
            const supports = VISION_MODELS.has(model);
            els.attachBtn.classList.toggle("disabled", !supports);
            els.attachBtn.title = supports ? "Attach image/video" : "Model does not support media";
            if (!supports) { state.pendingMedia = [];
                renderAttachmentsBar(); }
        }

        // ============================================================
        //  CHAT MANAGEMENT
        // ============================================================
        function createNewChat(provider) {
            const chat = {
                id: generateChatId(),
                provider: provider || state.provider,
                messages: [],
                createdAt: new Date().toISOString()
            };
            chatHistory.unshift(chat);
            saveChatsToStorage();
            return chat;
        }

        function loadChat(chatId) {
            const chat = chatHistory.find(c => c.id === chatId);
            if (!chat) return;
            currentChatId = chatId;
            state.provider = chat.provider || state.provider;
            els.providerBtns.forEach(b => b.classList.toggle('active', b.dataset.provider === state.provider));
            populateModels();
            renderChatMessages(chat);
            renderHistoryList();
            if (isMobile()) closeSidebar();
        }

        function renderChatMessages(chat) {
            els.chatCol.innerHTML = "";
            if (!chat || !chat.messages || chat.messages.length === 0) {
                els.chatCol.appendChild(els.emptyState);
                return;
            }
            chat.messages.forEach(m => {
                appendMessageDOM(m.role, m.content, false, m.media || []);
            });
            scrollToBottom();
        }

        function clearChat(chatId) {
            const chat = chatHistory.find(c => c.id === chatId);
            if (!chat) return;
            chat.messages = [];
            saveChatsToStorage();
            renderChatMessages(chat);
            renderHistoryList();
        }

        function deleteChat(chatId) {
            chatHistory = chatHistory.filter(c => c.id !== chatId);
            saveChatsToStorage();
            if (currentChatId === chatId) {
                currentChatId = null;
                els.chatCol.innerHTML = '';
                els.chatCol.appendChild(els.emptyState);
            }
            renderHistoryList();
        }

        // ============================================================
        //  RENDER HISTORY LIST
        // ============================================================
        function renderHistoryList() {
            els.historyList.innerHTML = '';
            if (chatHistory.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'history-item';
                empty.innerHTML = '<i class="ri ri-inbox-line"></i><span class="chat-preview" style="color:var(--text-muted);">No chats yet</span>';
                empty.style.cursor = 'default';
                els.historyList.appendChild(empty);
                return;
            }
            chatHistory.forEach(chat => {
                const btn = document.createElement('button');
                btn.className = 'history-item';
                if (chat.id === currentChatId) btn.classList.add('active-history');

                const firstMsg = chat.messages.length > 0 ? chat.messages[0].content : 'Empty chat';
                const preview = firstMsg.length > 40 ? firstMsg.substring(0, 40) + '...' : firstMsg;

                btn.innerHTML = `
                    <i class="ri ri-chat-3-line"></i>
                    <span class="chat-preview">${preview || 'Empty chat'}</span>
                `;
                btn.title = chat.provider + ' - ' + new Date(chat.createdAt).toLocaleString();
                btn.addEventListener('click', () => loadChat(chat.id));
                btn.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (confirm('Delete this chat?')) deleteChat(chat.id);
                });
                let longPressTimer;
                btn.addEventListener('touchstart', () => {
                    longPressTimer = setTimeout(() => {
                        if (confirm('Delete this chat?')) deleteChat(chat.id);
                    }, 600);
                });
                btn.addEventListener('touchend', () => clearTimeout(longPressTimer));
                btn.addEventListener('touchmove', () => clearTimeout(longPressTimer));
                els.historyList.appendChild(btn);
            });
            updateChatCount();
        }

        // ============================================================
        //  ATTACHMENTS
        // ============================================================
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(",")[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function getFileType(mime) {
            if (mime.startsWith("image/")) return "image";
            if (mime.startsWith("video/")) return "video";
            return "unknown";
        }

        els.attachBtn.addEventListener("click", () => {
            if (els.attachBtn.classList.contains("disabled")) {
                appendMessageDOM("error", "❌ Select a vision-capable model first.");
                return;
            }
            els.fileInput.click();
        });

        els.fileInput.addEventListener("change", async (e) => {
            const files = Array.from(e.target.files || []);
            for (const file of files) {
                const type = getFileType(file.type);
                if (type === "unknown") {
                    appendMessageDOM("error", "❌ Unsupported: " + file.type);
                    continue;
                }
                if (file.size > 20 * 1024 * 1024) {
                    appendMessageDOM("error", "❌ " + file.name + " exceeds 20MB");
                    continue;
                }
                try {
                    const base64 = await fileToBase64(file);
                    state.pendingMedia.push({
                        base64,
                        mimeType: file.type,
                        previewUrl: URL.createObjectURL(file),
                        type,
                        size: file.size,
                        name: file.name
                    });
                } catch (_) { appendMessageDOM("error", "❌ Failed to read " + file.name); }
            }
            els.fileInput.value = "";
            renderAttachmentsBar();
        });

        document.addEventListener("paste", async (e) => {
            const items = e.clipboardData?.items || [];
            for (const item of items) {
                if (item.type.startsWith("image/") || item.type.startsWith("video/")) {
                    const file = item.getAsFile();
                    if (!VISION_MODELS.has(els.modelSelect.value)) {
                        appendMessageDOM("error", "❌ This model doesn't support media.");
                        return;
                    }
                    if (file.size > 20 * 1024 * 1024) {
                        appendMessageDOM("error", "❌ File too large (max 20MB)");
                        return;
                    }
                    try {
                        const base64 = await fileToBase64(file);
                        const type = getFileType(file.type);
                        state.pendingMedia.push({
                            base64,
                            mimeType: file.type,
                            previewUrl: URL.createObjectURL(file),
                            type,
                            size: file.size,
                            name: file.name || (type === "video" ? "video.mp4" : "image.png")
                        });
                        renderAttachmentsBar();
                        appendMessageDOM("assistant", "✅ " + (type === "video" ? "Video" : "Image") + " pasted (" +
                            formatSize(file.size) + ")");
                    } catch (_) { appendMessageDOM("error", "❌ Failed to paste media"); }
                    break;
                }
            }
        });

        function renderAttachmentsBar() {
            els.attachmentsBar.innerHTML = "";
            state.pendingMedia.forEach((media, idx) => {
                const div = document.createElement("div");
                div.className = "thumb";
                div.innerHTML = `
                    ${media.type === "video" 
                        ? `<video src="${media.previewUrl}" muted playsinline></video>` 
                        : `<img src="${media.previewUrl}" alt="media">`}
                    <button class="remove" data-idx="${idx}" aria-label="Remove attachment"><i class="ri ri-close-line"></i></button>
                    <span class="file-badge"><i class="ri ${media.type === "video" ? "ri-video-line" : "ri-image-line"}"></i></span>
                `;
                els.attachmentsBar.appendChild(div);
            });
            els.attachmentsBar.querySelectorAll(".remove").forEach(btn => {
                btn.addEventListener("click", () => {
                    state.pendingMedia.splice(parseInt(btn.dataset.idx), 1);
                    renderAttachmentsBar();
                });
            });
        }

        // ============================================================
        //  MESSAGE RENDERING
        // ============================================================
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function parseCodeBlocks(text) {
            const segments = [];
            const regex = /```([a-zA-Z0-9+#.\-]*)\n([\s\S]*?)```/g;
            let last = 0,
                m;
            while ((m = regex.exec(text)) !== null) {
                if (m.index > last) segments.push({ type: "text", value: text.slice(last, m.index) });
                segments.push({ type: "code", lang: m[1] || "code", value: m[2].replace(/\n$/, "") });
                last = regex.lastIndex;
            }
            if (last < text.length) segments.push({ type: "text", value: text.slice(last) });
            return segments;
        }

        function renderMessageBody(container, content) {
            const segments = parseCodeBlocks(content);
            segments.forEach(seg => {
                if (seg.type === "text") {
                    if (!seg.value.trim()) return;
                    const p = document.createElement("div");
                    p.className = "msg-text";
                    p.textContent = seg.value.trim();
                    container.appendChild(p);
                } else {
                    const block = document.createElement("div");
                    block.className = "code-block";
                    const header = document.createElement("div");
                    header.className = "code-header";
                    header.innerHTML = `<span><i class="ri ri-code-line"></i> ${seg.lang}</span>`;
                    const actions = document.createElement("div");
                    actions.className = "code-actions";
                    const copyBtn = document.createElement("button");
                    copyBtn.innerHTML = '<i class="ri ri-file-copy-line"></i> Copy';
                    copyBtn.addEventListener("click", () => {
                        navigator.clipboard.writeText(seg.value).then(() => {
                            copyBtn.innerHTML = '<i class="ri ri-check-line"></i> Copied!';
                            setTimeout(() => copyBtn.innerHTML = '<i class="ri ri-file-copy-line"></i> Copy', 1200);
                        });
                    });
                    const fixBtn = document.createElement("button");
                    fixBtn.innerHTML = '<i class="ri ri-tools-line"></i> Fix';
                    fixBtn.addEventListener("click", () => {
                        els.userInput.value =
                            `Fix this ${seg.lang} code:\n\`\`\`${seg.lang}\n${seg.value}\n\`\`\``;
                        els.userInput.focus();
                        refreshSendBtn();
                    });
                    actions.appendChild(copyBtn);
                    actions.appendChild(fixBtn);
                    header.appendChild(actions);
                    const pre = document.createElement("pre");
                    pre.innerHTML = escapeHtml(seg.value);
                    block.appendChild(header);
                    block.appendChild(pre);
                    container.appendChild(block);
                }
            });
        }

        function buildActions(role, content, row) {
            const div = document.createElement("div");
            div.className = "msg-actions";

            const copy = document.createElement("button");
            copy.innerHTML = '<i class="ri ri-file-copy-line"></i>';
            copy.title = "Copy";
            copy.addEventListener("click", () => {
                navigator.clipboard.writeText(content).then(() => {
                    copy.innerHTML = '<i class="ri ri-check-line"></i>';
                    setTimeout(() => copy.innerHTML = '<i class="ri ri-file-copy-line"></i>', 1200);
                });
            });
            div.appendChild(copy);

            if (role === "assistant") {
                const up = document.createElement("button");
                up.innerHTML = '<i class="ri ri-thumb-up-line"></i>';
                up.title = "Good response";
                const down = document.createElement("button");
                down.innerHTML = '<i class="ri ri-thumb-down-line"></i>';
                down.title = "Bad response";
                up.addEventListener("click", () => {
                    up.classList.toggle("active-like");
                    down.classList.remove("active-dislike");
                });
                down.addEventListener("click", () => {
                    down.classList.toggle("active-dislike");
                    up.classList.remove("active-like");
                });
                div.appendChild(up);
                div.appendChild(down);

                const regen = document.createElement("button");
                regen.innerHTML = '<i class="ri ri-refresh-line"></i>';
                regen.title = "Regenerate";
                regen.addEventListener("click", () => regenerateFrom(row));
                div.appendChild(regen);
            }

            const more = document.createElement("button");
            more.innerHTML = '<i class="ri ri-more-2-fill"></i>';
            more.title = "More";
            div.appendChild(more);

            return div;
        }

        function appendMessageDOM(role, content, scroll = true, mediaList = []) {
            if (els.emptyState.parentNode) els.emptyState.remove();

            const row = document.createElement("div");
            row.className = `row ${role}`;

            const avatar = document.createElement("div");
            avatar.className = `avatar ${role}`;
            if (role === "user") avatar.innerHTML = '<i class="ri ri-user-3-line"></i>';
            else if (role === "error") avatar.innerHTML = '<i class="ri ri-error-warning-line"></i>';
            else avatar.innerHTML = '<i class="ri ri-sparkle-line"></i>';
            row.appendChild(avatar);

            const wrap = document.createElement("div");
            wrap.className = "bubble-wrap";

            if (role === "assistant") {
                const label = document.createElement("div");
                label.className = "sender-label";
                label.innerHTML = `<i class="ri ri-robot-line"></i> ${state.provider.charAt(0).toUpperCase() + state.provider.slice(1)}`;
                wrap.appendChild(label);
            }
            if (role === "error") {
                const label = document.createElement("div");
                label.className = "sender-label";
                label.style.color = "#ff7278";
                label.innerHTML = '<i class="ri ri-error-warning-line"></i> Error';
                wrap.appendChild(label);
            }

            renderMessageBody(wrap, content);

            if (mediaList && mediaList.length) {
                const mw = document.createElement("div");
                mw.style.cssText = "display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;";
                mediaList.forEach(media => {
                    const item = document.createElement("div");
                    item.style.cssText =
                        "border-radius:12px;overflow:hidden;max-width:150px;max-height:150px;border:1px solid var(--border);background:#0a0a0f;";
                    if (media.type === "video") {
                        const v = document.createElement("video");
                        v.src = media.previewUrl;
                        v.controls = true;
                        v.preload = "metadata";
                        v.playsInline = true;
                        v.style.cssText = "width:100%;height:100%;object-fit:cover;display:block;";
                        item.appendChild(v);
                    } else {
                        const img = document.createElement("img");
                        img.src = media.previewUrl;
                        img.alt = "media";
                        img.loading = "lazy";
                        img.style.cssText = "width:100%;height:100%;object-fit:cover;display:block;";
                        item.appendChild(img);
                    }
                    mw.appendChild(item);
                });
                wrap.appendChild(mw);
            }

            if (role === "assistant" || role === "error") {
                wrap.appendChild(buildActions(role, content, row));
            }

            row.appendChild(wrap);
            els.chatCol.appendChild(row);
            if (scroll) scrollToBottom();
            return row;
        }

        function appendTyping() {
            const row = document.createElement("div");
            row.className = "row assistant";
            row.id = "typingIndicator";
            row.innerHTML = `
                <div class="avatar assistant"><i class="ri ri-sparkle-line"></i></div>
                <div class="bubble-wrap">
                    <div class="sender-label"><i class="ri ri-robot-line"></i> ${state.provider.charAt(0).toUpperCase() + state.provider.slice(1)}</div>
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            `;
            els.chatCol.appendChild(row);
            scrollToBottom();
        }

        function removeTyping() {
            const el = document.getElementById("typingIndicator");
            if (el) el.remove();
        }

        function scrollToBottom() {
            const scroller = els.chatScroll;
            scroller.scrollTop = scroller.scrollHeight;
        }

        // ============================================================
        //  SEARCH
        // ============================================================
        els.searchBtn.addEventListener("click", openSearchPanel);
        els.closeSearchBtn.addEventListener("click", closeSearchPanel);
        els.searchInput.addEventListener("input", () => performSearch(els.searchInput.value));

        function openSearchPanel() {
            els.searchPanel.classList.add("active");
            els.searchInput.focus();
            if (isMobile()) closeSidebar();
            performSearch(els.searchInput.value);
        }

        function closeSearchPanel() {
            els.searchPanel.classList.remove("active");
            els.searchInput.value = "";
            renderSearchResults([]);
        }

        function performSearch(query) {
            const q = String(query).trim().toLowerCase();
            if (!q) { renderSearchResults([]); return; }
            const chat = getCurrentChat();
            if (!chat) { renderSearchResults([]); return; }
            const results = chat.messages
                .map((item, idx) => ({ role: item.role, content: item.content || "", index: idx }))
                .filter(item => item.content.toLowerCase().includes(q));
            renderSearchResults(results);
        }

        function renderSearchResults(results) {
            els.searchResults.innerHTML = "";
            if (!results || results.length === 0) {
                els.searchResults.innerHTML =
                    `<div class="no-results"><i class="ri ri-information-line"></i> No matches found.</div>`;
                return;
            }
            results.forEach(item => {
                const card = document.createElement("button");
                card.className = "search-result";
                card.innerHTML = `
                    <div class="result-role"><i class="ri ${item.role === "user" ? "ri-user-3-line" : "ri-robot-line"}"></i> ${item.role === "user" ? "You" : "Assistant"}</div>
                    <div class="result-text">${escapeHtml(item.content).slice(0, 240)}</div>
                `;
                card.addEventListener("click", () => {
                    const target = els.chatCol.children[item.index];
                    if (target) {
                        target.classList.add("highlight");
                        target.scrollIntoView({ behavior: "smooth", block: "center" });
                        setTimeout(() => target.classList.remove("highlight"), 2000);
                    }
                    closeSearchPanel();
                });
                els.searchResults.appendChild(card);
            });
        }

        // ============================================================
        //  INPUT / SEND
        // ============================================================
        function refreshSendBtn() {
            const has = els.userInput.value.trim().length > 0 || state.pendingMedia.length > 0;
            els.sendBtn.classList.toggle("mic-mode", !has);
            els.sendBtn.innerHTML = has ? '<i class="ri ri-send-plane-2-line"></i>' : '<i class="ri ri-mic-line"></i>';
            els.sendBtn.title = has ? "Send" : "Voice";
        }

        els.userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault();
                sendMessage(); }
        });
        els.userInput.addEventListener("input", () => {
            els.userInput.style.height = "auto";
            els.userInput.style.height = Math.min(els.userInput.scrollHeight, 180) + "px";
            refreshSendBtn();
        });
        els.sendBtn.addEventListener("click", () => {
            if (!els.sendBtn.classList.contains("mic-mode")) sendMessage();
        });

        // ============================================================
        //  BACKEND
        // ============================================================
        async function callBackend(provider, model, messages) {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ provider, model, messages })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || `Server error (${res.status})`);
            return data;
        }

        async function regenerateFrom(row) {
            const chat = getCurrentChat();
            if (!chat) return;
            const idx = Array.from(els.chatCol.children).indexOf(row);
            if (idx < 0 || idx >= chat.messages.length) return;

            const upTo = chat.messages.slice(0, idx);
            appendTyping();
            try {
                const model = els.modelSelect.value;
                const msgs = upTo.map(m => ({
                    role: m.role,
                    content: m.content,
                    media: m.media ? m.media.map(mm => ({ base64: mm.base64, mimeType: mm.mimeType, type: mm.type })) :
                        undefined
                }));
                const data = await callBackend(state.provider, model, msgs);
                removeTyping();
                chat.messages[idx] = { role: "assistant", content: data.reply };
                saveChatsToStorage();
                renderChatMessages(chat);
                renderHistoryList();
            } catch (err) {
                removeTyping();
                appendMessageDOM("error", err.message || String(err));
            }
        }

        async function sendMessage() {
            const text = els.userInput.value.trim();
            if (!text && state.pendingMedia.length === 0) return;

            let chat = getCurrentChat();
            if (!chat) {
                chat = createNewChat(state.provider);
                currentChatId = chat.id;
                renderHistoryList();
            }

            const media = state.pendingMedia.slice();

            chat.messages.push({
                role: "user",
                content: text,
                media: media.map(m => ({ type: m.type, previewUrl: m.previewUrl, base64: m.base64, mimeType: m
                        .mimeType }))
            });
            saveChatsToStorage();
            renderChatMessages(chat);
            renderHistoryList();

            els.userInput.value = "";
            els.userInput.style.height = "auto";
            state.pendingMedia = [];
            renderAttachmentsBar();
            refreshSendBtn();
            els.sendBtn.disabled = true;
            appendTyping();

            try {
                const msgs = chat.messages.map(m => ({
                    role: m.role,
                    content: m.content,
                    media: m.media ? m.media.map(mm => ({ base64: mm.base64, mimeType: mm.mimeType, type: mm.type })) :
                        undefined
                }));
                const data = await callBackend(state.provider, els.modelSelect.value, msgs);
                removeTyping();
                chat.messages.push({ role: "assistant", content: data.reply });
                saveChatsToStorage();
                renderChatMessages(chat);
                renderHistoryList();
            } catch (err) {
                removeTyping();
                appendMessageDOM("error", err.message || String(err));
            } finally {
                els.sendBtn.disabled = false;
            }
        }

        // ============================================================
        //  BUTTON HANDLERS
        // ============================================================
        els.newChatBtn.addEventListener("click", () => {
            const chat = createNewChat(state.provider);
            currentChatId = chat.id;
            renderHistoryList();
            renderChatMessages(chat);
            if (isMobile()) closeSidebar();
        });

        els.clearBtn.addEventListener("click", () => {
            const chat = getCurrentChat();
            if (!chat || chat.messages.length === 0) return;
            if (confirm('Clear all messages in this chat?')) clearChat(chat.id);
        });

        els.seeAllBtn.addEventListener("click", () => {
            if (isMobile()) openSidebar();
        });

        els.providerBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                const provider = btn.dataset.provider;
                state.provider = provider;
                const chat = getCurrentChat();
                if (!chat || chat.provider !== provider) {
                    const newChat = createNewChat(provider);
                    currentChatId = newChat.id;
                    renderChatMessages(newChat);
                } else {
                    chat.provider = provider;
                    saveChatsToStorage();
                }
                els.providerBtns.forEach(b => b.classList.toggle('active', b.dataset.provider === provider));
                populateModels();
                renderHistoryList();
                if (isMobile()) closeSidebar();
            });
        });

        // ============================================================
        //  INIT
        // ============================================================
        const hasStored = loadChatsFromStorage();

        if (chatHistory.length > 0) {
            currentChatId = chatHistory[0].id;
            state.provider = chatHistory[0].provider || 'gemini';
            els.providerBtns.forEach(b => b.classList.toggle('active', b.dataset.provider === state.provider));
            populateModels();
            renderChatMessages(chatHistory[0]);
        } else {
            const chat = createNewChat('gemini');
            currentChatId = chat.id;
            renderChatMessages(chat);
        }

        renderHistoryList();
        loadStatus();
        refreshSendBtn();

        console.log('✅ DeepSeek AI with provider logos loaded!');
        console.log(`📊 ${chatHistory.length} chats loaded from localStorage`);
        console.log(`📱 ${isMobile() ? 'Mobile' : 'Desktop'} mode detected`);
    </script>
</body>
</html>
